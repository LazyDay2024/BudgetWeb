<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Q&A</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117;
      --sf: #161B22;
      --sf2: #21262D;
      --sf3: #2D333B;
      --bd: #30363D;
      --bd2: #444C56;
      --tx: #E6EDF3;
      --tx2: #8B949E;
      --tx3: #6E7681;
      --blue: #58A6FF;
      --blue2: #1F6FEB;
      --bluebg: #0D1B2E;
      --green: #3FB950;
      --green2: #196C2E;
      --greenbg: #0D2119;
      --red: #F85149;
      --redbg: #2D1117;
      --amber: #D29922;
      --amberbg: #271D03;
      --fn: "IBM Plex Sans Thai", sans-serif;
      --mono: "IBM Plex Mono", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--fn);
      background: var(--bg);
      color: var(--tx);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--bd);
    }

    .header-pill {
      background: var(--blue2);
      color: var(--blue);
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
    }

    .header-sub {
      font-size: 11px;
      color: var(--tx3);
    }

    /* Card */
    .card {
      background: var(--sf);
      border: 1px solid var(--bd);
      border-radius: 10px;
      overflow: hidden;
    }

    .card-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--bd);
      font-size: 12px;
      font-weight: 500;
      color: var(--tx2);
      letter-spacing: .3px;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .card-body {
      padding: 20px 16px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--sf2);
      border: 1px solid var(--bd);
      border-radius: 6px;
      font-size: 12px;
      color: var(--tx2);
      font-family: var(--mono);
      min-height: 38px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--tx3);
      flex-shrink: 0;
      transition: background .3s;
    }

    .status-dot.recording {
      background: var(--red);
      animation: blink 1s infinite;
    }

    .status-dot.success {
      background: var(--green);
    }

    .status-dot.sending {
      background: var(--amber);
    }

    .status-dot.error {
      background: var(--red);
    }

    .status-dot.speaking {
      background: var(--blue);
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .35;
      }
    }

    /* Mic section */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 8px 0 4px;
    }

    .mic-btn {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1.5px solid var(--bd2);
      background: var(--sf2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      transition: all .2s cubic-bezier(.34, 1.56, .64, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn:hover {
      border-color: var(--blue);
      transform: scale(1.04);
    }

    .mic-btn:active {
      transform: scale(.96);
    }

    .mic-btn.recording {
      border-color: var(--red);
      box-shadow: 0 0 0 8px rgba(248, 81, 73, .1), 0 0 0 18px rgba(248, 81, 73, .04);
      animation: ring 1.6s infinite;
    }

    @keyframes ring {

      0%,
      100% {
        box-shadow: 0 0 0 6px rgba(248, 81, 73, .12), 0 0 0 16px rgba(248, 81, 73, .04);
      }

      50% {
        box-shadow: 0 0 0 14px rgba(248, 81, 73, .06), 0 0 0 28px rgba(248, 81, 73, .02);
      }
    }

    .mic-btn.disabled {
      opacity: .3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .mic-icon {
      width: 44px;
      height: 44px;
      transition: filter .2s;
    }

    .mic-btn.recording .mic-icon {
      filter: drop-shadow(0 0 6px rgba(248, 81, 73, .7));
    }

    .mic-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mic-label {
      font-size: 12px;
      color: var(--tx3);
      letter-spacing: .05em;
      text-align: center;
      font-family: var(--mono);
    }

    .timer {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      color: var(--red);
      letter-spacing: .1em;
      height: 28px;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity .3s;
    }

    .timer.active {
      opacity: 1;
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
      opacity: 0;
      transition: opacity .3s;
    }

    .waveform.active {
      opacity: 1;
    }

    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--blue);
      height: 5px;
      animation: wave .7s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) {
      animation-delay: 0s;
    }

    .wave-bar:nth-child(2) {
      animation-delay: .08s;
    }

    .wave-bar:nth-child(3) {
      animation-delay: .16s;
    }

    .wave-bar:nth-child(4) {
      animation-delay: .24s;
    }

    .wave-bar:nth-child(5) {
      animation-delay: .32s;
    }

    .wave-bar:nth-child(6) {
      animation-delay: .16s;
    }

    .wave-bar:nth-child(7) {
      animation-delay: .08s;
    }

    @keyframes wave {

      0%,
      100% {
        height: 5px;
      }

      50% {
        height: 22px;
      }
    }

    /* Text input */
    .text-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .text-input {
      flex: 1;
      background: var(--sf2);
      border: 1px solid var(--bd);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--tx);
      font-family: var(--fn);
      font-size: 13px;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      transition: border .2s;
      line-height: 1.5;
    }

    .text-input:focus {
      border-color: var(--blue);
    }

    .text-input::placeholder {
      color: var(--tx3);
    }

    .btn-send-text {
      flex-shrink: 0;
      padding: 0 14px;
      height: 40px;
      background: var(--sf2);
      border: 1px solid var(--bd2);
      border-radius: 6px;
      color: var(--tx2);
      font-family: var(--fn);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn-send-text:hover {
      background: var(--sf3);
      color: var(--tx);
      border-color: var(--blue);
    }

    .btn-send-text:disabled {
      opacity: .4;
      pointer-events: none;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--bd);
      margin: 4px 0;
    }

    /* Audio preview */
    .audio-preview {
      display: none;
      margin-bottom: 12px;
    }

    .audio-preview.visible {
      display: block;
    }

    .audio-preview audio {
      width: 100%;
      height: 36px;
      border-radius: 6px;
      accent-color: var(--blue);
    }

    /* Send button */
    .send-btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--blue2);
      border: 1px solid var(--blue);
      border-radius: 6px;
      color: var(--tx);
      font-family: var(--fn);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: .4;
      pointer-events: none;
      transition: all .2s;
    }

    .send-btn.active {
      opacity: 1;
      pointer-events: auto;
    }

    .send-btn.active:hover {
      background: #388bfd22;
    }

    .send-btn.sending {
      opacity: .7;
      pointer-events: none;
    }

    /* Response player card */
    .response-player {
      display: none;
    }

    .response-player.visible {
      display: block;
    }

    .player-card {
      background: var(--greenbg);
      border: 1px solid var(--green2);
      border-radius: 10px;
      overflow: hidden;
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--green2);
    }

    .player-icon {
      width: 28px;
      height: 28px;
      background: var(--green2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .player-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      font-family: var(--mono);
    }

    .player-state {
      margin-left: auto;
      font-size: 11px;
      color: var(--tx3);
      font-family: var(--mono);
    }

    .player-body {
      padding: 14px;
    }

    .response-text-box {
      background: var(--sf2);
      border: 1px solid var(--bd);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--tx);
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .player-controls {
      display: flex;
      gap: 8px;
    }

    .btn-replay {
      flex: 1;
      padding: 8px 12px;
      background: var(--sf2);
      border: 1px solid var(--bd2);
      border-radius: 6px;
      color: var(--tx2);
      font-family: var(--fn);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all .2s;
    }

    .btn-replay:hover {
      background: var(--sf3);
      color: var(--tx);
      border-color: var(--green);
    }

    .btn-stop {
      padding: 8px 12px;
      background: var(--redbg);
      border: 1px solid #3d1a19;
      border-radius: 6px;
      color: var(--red);
      font-family: var(--fn);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-stop:hover {
      background: #3d1a19;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--tx3);
      font-family: var(--mono);
      padding-top: 8px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div>
        <span class="header-pill">VOICE</span>
      </div>
      <div>
        <div class="header-title">Voice Q&amp;A</div>
        <div class="header-sub">n8n Integration · Web Speech TTS</div>
      </div>
    </div>

    <!-- Recorder card -->
    <div class="card">
      <div class="card-header">บันทึกเสียง</div>
      <div class="card-body">

        <div class="status-bar" style="margin-bottom: 16px;">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">พร้อมรับคำสั่ง</span>
        </div>

        <div class="mic-section">
          <button class="mic-btn" id="micBtn" onmousedown="startRec(event)" onmouseup="stopRec(event)"
            ontouchstart="startRec(event)" ontouchend="stopRec(event)">
            <svg class="mic-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="18" y="4" width="16" height="26" rx="8" fill="none" stroke="#58A6FF" stroke-width="2.5" />
              <path d="M10 26c0 8.837 7.163 16 16 16s16-7.163 16-16" stroke="#58A6FF" stroke-width="2.5"
                stroke-linecap="round" />
              <line x1="26" y1="42" x2="26" y2="48" stroke="#58A6FF" stroke-width="2.5" stroke-linecap="round" />
              <line x1="18" y1="48" x2="34" y2="48" stroke="#58A6FF" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </button>

          <div class="mic-meta">
            <div class="waveform" id="waveform">
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
            </div>
            <div class="mic-label" id="micLabel">กดค้างเพื่ออัดเสียง</div>
            <div class="timer" id="timer">00:00</div>
          </div>
        </div>

        <div class="divider" style="margin: 16px 0;"></div>

        <div class="audio-preview" id="audioPreview">
          <audio id="audioPlayer" controls></audio>
        </div>

        <button class="send-btn" id="sendBtn" onclick="sendAudio()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          ส่งคำถาม
        </button>

      </div>
    </div>

    <!-- Text input card -->
    <div class="card">
      <div class="card-header">พิมพ์คำถาม</div>
      <div class="card-body">
        <div class="text-input-row">
          <textarea class="text-input" id="textInput" rows="1" placeholder="พิมพ์คำถามแล้วกด Enter หรือกดปุ่มส่ง..."
            onkeydown="handleTextKey(event)"></textarea>
          <button class="btn-send-text" id="sendTextBtn" onclick="sendText()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            ส่ง
          </button>
        </div>
      </div>
    </div>

    <!-- Response player card -->
    <div class="response-player" id="responsePlayer">
      <div class="player-card">
        <div class="player-header">
          <div class="player-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3FB950" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </div>
          <span class="player-title">เสียงตอบกลับ</span>
          <span class="player-state" id="playerState">—</span>
        </div>
        <div class="player-body">
          <div class="response-text-box" id="responseText"></div>
          <div class="player-controls">
            <button class="btn-replay" onclick="replayTTS()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              เล่นซ้ำ
            </button>
            <button class="btn-stop" onclick="stopTTS()">หยุด</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Voice Q&A · n8n · Web Speech API</div>

  </div>

  <script>
    // ── Config ─────────────────────────────────────────────
    const WEBHOOK_URL = 'https://lily-totemic-irmgard.ngrok-free.dev/webhook/voice-query';
    const WEBHOOK_TEXT_URL = 'https://lily-totemic-irmgard.ngrok-free.dev/webhook/text-query';

    // ── State ──────────────────────────────────────────────
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let isRecording = false;
    let timerInterval = null;
    let seconds = 0;
    let stream = null;
    let lastReply = '';

    // ── DOM refs ───────────────────────────────────────────
    const micBtn = document.getElementById('micBtn');
    const micLabel = document.getElementById('micLabel');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const timerEl = document.getElementById('timer');
    const waveform = document.getElementById('waveform');
    const sendBtn = document.getElementById('sendBtn');
    const audioPreview = document.getElementById('audioPreview');
    const audioPlayer = document.getElementById('audioPlayer');
    const responsePlayer = document.getElementById('responsePlayer');
    const responseText = document.getElementById('responseText');
    const playerState = document.getElementById('playerState');
    const textInput = document.getElementById('textInput');
    const sendTextBtn = document.getElementById('sendTextBtn');

    // ── Utils ──────────────────────────────────────────────
    function setStatus(type, text) {
      statusDot.className = 'status-dot ' + (type || '');
      statusText.textContent = text;
    }

    function fmt(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const ss = (s % 60).toString().padStart(2, '0');
      return m + ':' + ss;
    }

    // ── TTS ────────────────────────────────────────────────
    function speakText(text) {
      if (!text || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'th-TH';
      utt.rate = 1;
      utt.onstart = () => { setStatus('speaking', 'กำลังอ่านเสียง...'); playerState.textContent = '▶ กำลังอ่าน'; };
      utt.onend = () => { setStatus('success', 'เล่นเสร็จแล้ว'); playerState.textContent = '✓ เสร็จ'; };
      utt.onerror = () => { setStatus('error', 'TTS error'); playerState.textContent = '✗ ผิดพลาด'; };
      speechSynthesis.speak(utt);
    }

    function replayTTS() { speakText(lastReply); }

    function stopTTS() {
      window.speechSynthesis.cancel();
      setStatus('success', 'หยุดเสียงแล้ว');
      playerState.textContent = '—';
    }

    // ── Recording ──────────────────────────────────────────
    async function startRec(e) {
      if (e) e.preventDefault();
      if (isRecording) return;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        audioBlob = null;

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = ev => { if (ev.data.size > 0) audioChunks.push(ev.data); };
        mediaRecorder.onstop = onRecordStop;
        mediaRecorder.start(100);

        isRecording = true;
        seconds = 0;
        micBtn.classList.add('recording');
        waveform.classList.add('active');
        timerEl.classList.add('active');
        timerEl.textContent = '00:00';
        micLabel.textContent = 'ปล่อยมือเพื่อหยุด';
        setStatus('recording', 'กำลังอัดเสียง...');
        sendBtn.classList.remove('active');
        audioPreview.classList.remove('visible');
        responsePlayer.classList.remove('visible');

        timerInterval = setInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000);

      } catch {
        setStatus('error', 'ไม่สามารถเข้าถึงไมค์ได้ — เช็ค permission');
      }
    }

    function stopRec(e) {
      if (e) e.preventDefault();
      if (!isRecording) return;
      isRecording = false;
      clearInterval(timerInterval);
      mediaRecorder.stop();
      stream.getTracks().forEach(t => t.stop());
      micBtn.classList.remove('recording');
      waveform.classList.remove('active');
      micLabel.textContent = 'กดค้างเพื่ออัดเสียง';
      setStatus('', 'หยุดอัดแล้ว — กำลังเตรียมไฟล์...');
    }

    function onRecordStop() {
      audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      audioPlayer.src = URL.createObjectURL(audioBlob);
      audioPreview.classList.add('visible');
      timerEl.classList.remove('active');
      sendBtn.classList.add('active');
      setStatus('success', `อัดเสร็จ ${fmt(seconds)} — พร้อมส่ง`);
    }

    // ── Send to n8n ────────────────────────────────────────
    async function sendAudio() {
      const url = WEBHOOK_URL;
      if (!audioBlob) { setStatus('error', 'ยังไม่มีไฟล์เสียง'); return; }

      setStatus('sending', 'กำลังส่งไป n8n...');
      sendBtn.classList.add('sending');
      sendBtn.textContent = 'กำลังส่ง...';
      responsePlayer.classList.remove('visible');

      const form = new FormData();
      form.append('audio', audioBlob, 'recording.webm');

      try {
        const res = await fetch(url, { method: "POST", headers: { "User-Agent": "n8n-voice-client" }, body: form });
        const contentType = res.headers.get('content-type') || '';
        let json = null;

        if (contentType.includes('application/json')) {
          json = await res.json();
        } else {
          try { json = JSON.parse(await res.text()); } catch { json = null; }
        }

        const reply = json
          ? (json.output || json.text || json.message || json.response || JSON.stringify(json))
          : 'ได้รับ response แล้ว แต่ไม่มีข้อความ';

        lastReply = reply;
        responseText.textContent = reply;
        playerState.textContent = '—';
        responsePlayer.classList.add('visible');

        setStatus('success', 'ได้รับคำตอบแล้ว — กำลังอ่าน...');
        speakText(reply);

      } catch (err) {
        setStatus('error', 'ส่งไม่ได้: ' + err.message);
        console.error(err);
      } finally {
        sendBtn.classList.remove('sending');
        sendBtn.classList.add('active');
        sendBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg> ส่งคำถาม`;
      }
    }
    // ── Send text to n8n ───────────────────────────────────
    function handleTextKey(e) {
      // Enter ส่ง, Shift+Enter ขึ้นบรรทัดใหม่
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendText();
      }
    }

    async function sendText() {
      const text = textInput.value.trim();
      if (!text) return;

      setStatus('sending', 'กำลังส่งคำถาม...');
      sendTextBtn.disabled = true;
      responsePlayer.classList.remove('visible');

      try {
        const res = await fetch(WEBHOOK_TEXT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'User-Agent': 'n8n-voice-client'
          },
          body: JSON.stringify({ text })
        });

        const contentType = res.headers.get('content-type') || '';
        let json = null;
        if (contentType.includes('application/json')) {
          json = await res.json();
        } else {
          try { json = JSON.parse(await res.text()); } catch { json = null; }
        }

        const reply = json
          ? (json.output || json.text || json.message || json.response || JSON.stringify(json))
          : 'ได้รับ response แล้ว แต่ไม่มีข้อความ';

        lastReply = reply;
        responseText.textContent = reply;
        playerState.textContent = '—';
        responsePlayer.classList.add('visible');

        setStatus('success', 'ได้รับคำตอบแล้ว — กำลังอ่าน...');
        speakText(reply);
        textInput.value = '';

      } catch (err) {
        setStatus('error', 'ส่งไม่ได้: ' + err.message);
        console.error(err);
      } finally {
        sendTextBtn.disabled = false;
      }
    }
  </script>
